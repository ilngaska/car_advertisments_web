pre-commit:
  parallel: true
  jobs:
    - name: yalphabetize
      glob: "config/locales/*.yml"
      run: bundle exec yalphabetize {staged_files} --check

    - name: rubocop
      glob: "*.rb"
      exclude:
        - config/application.rb
        - config/routes.rb
      run: bundle exec rubocop --force-exclusion {staged_files}

    - name: brakeman
      run: bundle exec brakeman --quiet

pre-push:
  jobs:
    - name: rspec
      run: bundle exec rspec